spring:
  application:
    name: spring-ai-chatbot

  datasource:
    url: jdbc:h2:file:~/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: NEVER
      data-locations: 'classpath:sql/data.sql'

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 1052371770015-n0guj5j8ktr2ljeot5o29dv0jm4gfocp.apps.googleusercontent.com
            client-secret: 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
#            scope:
#              - email
#              - profile

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.pawan.krd
      chat:
        options:
          model: gpt-oss-20b
#          model: cosmosrp
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        options:
#          model: qwen2.5:7b

server:
  servlet:
    context-path: /api
  port: 8080

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  security:
    enabled: true
    public-endpoints:
      - /auth/**
      - /oauth2/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /swagger-ui.html
      - /h2-console/**
    jwt:
      secret: my-secret-key-which-should-be-32-chars-min-change-this-later
      expiration-in-hours: 2