spring:
  application:
    name: spring-ai-chatbot

  datasource:
    url: jdbc:h2:file:~/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: 'classpath:sql/data.sql'

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.pawan.krd
      chat:
        options:
          model: gpt-oss-20b
