spring:
  datasource:
    url: ${DATABASE_URL:}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  frontend-url: https://ai-services-console.onrender.com
  security:
    public-endpoints:
      - /auth/**
      - /oauth2/**
      - /actuator/**