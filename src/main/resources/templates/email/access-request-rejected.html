<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{email/fragments/head :: head('Access Request Rejected')}" />

<body>

<table class="container" role="presentation" width="100%">
    <tr>
        <td>

            <table class="email-card" role="presentation" width="100%">

                <th:block th:replace="~{email/fragments/header :: header(${appName})}" />

                <tr>
                    <td class="content">

                        <h2 style="color: #c62828;">Access Request Rejected</h2>

                        <p>
                            Hello
                            <strong th:text="${name}">User</strong>,
                        </p>

                        <p>
                            We regret to inform you that your access request
                            <strong th:text="${requestId}">#123</strong>
                            has been <b>rejected</b>.
                        </p>

                        <p>
                            <b>Reason:</b>
                            <span th:text="${reason}">
                                Not specified
                            </span>
                        </p>

                        <p>
                            If you believe this was a mistake,
                            you may submit a new request or contact support.
                        </p>

                        <th:block
                                th:replace="~{email/fragments/button
                                :: button(
                                    'Submit New Request',
                                    ${requestLink}
                                )}"
                        />

                        <p>
                            If the button does not work, copy and paste:
                        </p>

                        <div class="link-box">
                            <span th:text="${requestLink}">
                                request-link
                            </span>
                        </div>

                    </td>
                </tr>

                <th:block th:replace="~{email/fragments/footer :: footer(${appName})}" />

            </table>

        </td>
    </tr>
</table>

</body>
</html>
