spring:
  application:
    name: ai-services-core

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        debug: true

  ai:
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 500
        multiplier: 2
        max-interval: 3000

    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.pawan.krd
      chat:
        options:
          model: openai/gpt-oss-20b

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,threaddump
  endpoint:
    health:
      show-details: always

app:
  security:
    enabled: true
    jwt:
      secret: ${JWT_SECRET_KEY:}
      expiration-in-hours: 2
    verification:
      email:
        secret: ${VERIFICATION_SECRET_KEY:}
        expiration-in-minutes: 30

  cors:
    allowed-origins:
      - http://localhost:4200
      - https://ai-services-console.onrender.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS

  api:
    response:
      wrapper:
        enabled: true
        base-package: com.arsan.ai.controller
        excluded-paths:
          - /v3/api-docs
          - /swagger
          - /actuator
          - /login
          - /oauth2
          - /error