<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="styles">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7fb;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
        }

        table {
            border-spacing: 0;
        }

        .container {
            width: 100%;
            background-color: #f4f7fb;
            padding: 40px 16px;
        }

        .email-card {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .content {
            padding: 40px 32px;
        }

        .content h2 {
            margin-top: 0;
            font-size: 22px;
            color: #111827;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
        }

        .button-wrapper {
            text-align: center;
            margin: 32px 0;
        }

        .button {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .link-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 12px;
            border-radius: 8px;
            word-break: break-word;
            font-size: 14px;
            color: #374151;
        }

        .footer {
            padding: 24px 32px;
            border-top: 1px solid #e5e7eb;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }

        @media screen and (max-width: 600px) {

            .content {
                padding: 28px 20px;
            }

            .button {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>

</th:block>
</html>
