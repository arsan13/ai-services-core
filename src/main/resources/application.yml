spring:
  application:
    name: ai-services-core

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}

  ai:
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 500
        multiplier: 2
        max-interval: 3000

    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.pawan.krd
      chat:
        options:
          model: openai/gpt-oss-20b

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,threaddump
  endpoint:
    health:
      show-details: always

app:
  security:
    enabled: true
    jwt:
      secret: ${JWT_SECRET_KEY}
      expiration-in-hours: 2

  api:
    response:
      wrapper:
        enabled: true
        base-package: com.arsan.ai.controller
        excluded-paths:
          - /v3/api-docs
          - /swagger
          - /actuator
          - /login
          - /oauth2
          - /error