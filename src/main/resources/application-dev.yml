spring:
  datasource:
    url: jdbc:h2:file:~/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    locations: classpath:db/migration,classpath:db/dev

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  frontend-url: http://localhost:4200
  security:
    public-endpoints:
      - /actuator/**
      - /auth/**
      - /oauth2/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /swagger-ui.html
      - /h2-console/**