spring:
  config:
    import: optional:classpath:application-secrets.yml

  datasource:
    url: jdbc:h2:file:~/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: NEVER
      data-locations: 'classpath:sql/data.sql'

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  frontend-url: http://localhost:4200
  security:
    public-endpoints:
      - /actuator/**
      - /auth/**
      - /oauth2/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /swagger-ui.html
      - /h2-console/**