spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  frontend-url: https://ai-services-console.vercel.app
  security:
    public-endpoints:
      - /auth/**
      - /oauth2/**
      - /actuator/**